<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom Simple Game Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="controls">
        Controls: SPACE = Jump | ARROWS = Move
    </div>

    <script>
        // Simple Phaser game configuration
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#87CEEB',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player;
        let obstacles;
        let score = 0;
        let scoreText;

        function preload() {
            // We don't need to load assets since we're creating them programmatically
            // In a real game, we'd load sprites, audio, etc. here
        }

        function create() {
            // Add ground
            const ground = this.physics.add.staticGroup();
            ground.create(400, 580, null).setSize(800, 40).setTint(0x4CAF50);

            // Create player (yellow bird)
            player = this.physics.add.sprite(100, 300, null);
            player.setSize(32, 24);
            player.setTint(0xFFC107);
            player.setCollideWorldBounds(true);
            player.setBounce(0.5, 0.5);
            player.setDepth(1);

            // Create obstacles (green pipes)
            obstacles = this.physics.add.group();

            for (let i = 0; i < 5; i++) {
                const pipe = obstacles.create(
                    700 + (i * 300),
                    Phaser.Math.Between(100, 500),
                    null
                );
                pipe.setSize(52, 150);
                pipe.setTint(0x2E7D32);
                pipe.setImmovable(true);
                pipe.body.allowGravity = false;
            }

            // Add collision between player and ground
            this.physics.add.collider(player, ground);

            // Add collision between player and obstacles
            this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

            // Score display
            scoreText = this.add.text(16, 16, 'Score: 0', {
                fontSize: '20px',
                fill: '#ffffff',
                fontFamily: 'Arial'
            });

            // Instructions
            this.add.text(400, 50, 'Press SPACE to jump!\nAvoid the green pipes!', {
                fontSize: '18px',
                fill: '#ffffff',
                fontFamily: 'Arial'
            }).setOrigin(0.5, 0);

            // Move obstacles left
            this.time.addEvent({
                delay: 100,
                callback: () => {
                    obstacles.getChildren().forEach(pipe => {
                        pipe.x -= 2;
                    });
                },
                loop: true
            });
        }

        function update() {
            // Player controls
            const cursors = this.input.keyboard.createCursorKeys({
                up: Phaser.Input.Keyboard.KeyCodes.SPACE,
                down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A,
                right: Phaser.Input.Keyboard.KeyCodes.D
            });

            // Jump
            if (Phaser.Input.Keyboard.JustDown(cursors.up)) {
                player.setVelocityY(-200);
            }

            // Horizontal movement
            if (cursors.left.isDown) {
                player.setVelocityX(-160);
            } else if (cursors.right.isDown) {
                player.setVelocityX(160);
            } else {
                player.setVelocityX(0);
            }

            // Update score based on distance traveled
            const newScore = Math.floor(Math.abs(player.x - 100) / 10);
            if (newScore > score) {
                score = newScore;
                scoreText.setText('Score: ' + score);
            }

            // Check if player fell off the bottom
            if (player.y > 650) {
                resetGame(this);
            }
        }

        function hitObstacle(playerSprite, obstacle) {
            // Flash red
            this.cameras.main.flash(200);

            // Reset game after short delay
            const scene = this;
            this.time.delayedCall(500, function() {
                resetGame(scene);
            });
        }

        function resetGame(scene) {
            scene.scene.restart();
            score = 0;
            scoreText.setText('Score: 0');
        }
    </script>
</body>
</html>
